<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VÖRNTEC — Let's Talk</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    font-family: 'Manrope', sans-serif;
    background: #f8f9fc;
    color: #1e2740;
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  .page {
    max-width: 900px;
    margin: 0 auto;
    padding: 28px 48px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
  }

  /* Header */
  .header {
    display: flex; justify-content: space-between; align-items: center;
    width: 100%;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(59,77,140,0.1);
  }
  .logo-img { height: 32px; width: auto; }
  .header-badges { display: flex; gap: 6px; }
  .h-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 600; color: #4a5578;
    border: 1px solid rgba(59,77,140,0.1);
    background: #fff;
    padding: 4px 10px; border-radius: 5px;
    display: flex; align-items: center; gap: 5px;
  }
  .bdot { width: 5px; height: 5px; border-radius: 50%; }
  .bdot.g { background: #00b36b; }
  .bdot.o { background: #e67e22; }

  /* Centre content */
  .centre {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
    text-align: center;
    max-width: 620px;
  }

  .headline {
    font-size: 42px;
    font-weight: 800;
    line-height: 1.2;
    color: #2a3668;
    letter-spacing: -0.5px;
  }
  .headline .money { color: #00b36b; }
  .headline .dim { color: #7a8399; font-weight: 600; }

  .qr-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .qr-wrap {
    width: 220px; height: 220px;
    background: #fff;
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    padding: 14px;
    border: 2px solid rgba(0,179,107,0.2);
    box-shadow: 0 8px 32px rgba(0,179,107,0.1), 0 2px 8px rgba(59,77,140,0.06);
  }
  .qr-wrap img {
    width: 100%; height: 100%;
    border-radius: 8px;
  }
  .qr-cta {
    font-size: 16px;
    font-weight: 600;
    color: #4a5578;
  }
  .qr-cta strong { color: #00b36b; }

  /* Footer */
  .footer {
    width: 100%;
    display: flex; justify-content: center; align-items: center;
    padding-top: 12px;
    border-top: 1px solid rgba(59,77,140,0.1);
  }
  .footer a {
    color: #00b36b; text-decoration: none;
    font-weight: 600; font-size: 14px;
  }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <img src="LOGO-04.png" class="logo-img" alt="VÖRNTEC">
    <div class="header-badges">
      <div class="h-badge"><span class="bdot g"></span> NVIDIA Inception</div>
      <div class="h-badge"><span class="bdot o"></span> Ignite London AI Hub</div>
    </div>
  </div>

  <div class="centre">
    <div class="headline">
      Let's talk about how to save <span class="money">£30M</span> per year<br>
      <span class="dim">while reducing methane emissions.</span>
    </div>

    <div class="qr-block">
      <div class="qr-wrap">
        <img src="bookings.png" alt="QR — Book a meeting">
      </div>
      <div class="qr-cta">Scan to <strong>book a meeting</strong></div>
    </div>
  </div>

  <div class="footer">
    <a href="https://vorntec.com">vorntec.com</a>
  </div>
</div>
</body>
</html>
